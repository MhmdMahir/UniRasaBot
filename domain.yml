version: "3.1"

intents:
  - greet
  - goodbye
  - ask_course
  - ask_programme_type

entities:
  - course
  - programme

slots:
  course:
    type: text
    mappings:
      - type: from_entity
        entity: course

  programme:
    type: text
    mappings:
      - type: from_entity
        entity: programme

responses:
  utter_greet:
    - text: "Hello! How can I help you?"

  utter_goodbye:
    - text: "Goodbye! Have a nice day."

  utter_ask_course:
    - text: "Which course are you interested in?"

  utter_course_info:
    - text: "The {course} is available under the {programme} programme."

actions:
  - action_get_course_info