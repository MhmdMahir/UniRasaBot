version: "3.1"

nlu:
- intent: greet
  examples: |
    - hey
    - hello
    - hi
    - good morning
    - good evening
    - hey there

- intent: goodbye
  examples: |
    - bye
    - goodbye
    - see you around
    - see you later
    - have a nice day

- intent: thank
  examples: |
    - thanks
    - thank you
    - thanks a lot
    - appreciate it

- intent: ask_programmes_by_level
  examples: |
    - What [diploma](level) programmes do you offer?
    - Tell me about your [bachelor](level) degrees
    - List all [undergraduate](level) programmes
    - I'm interested in [diploma](level) courses
    - What [bachelors](level) programmes are available?

- intent: ask_programme_courses
  examples: |
    - What courses are in the [Diploma in Marketing](programme_name)?
    - Can you list the subjects for [Bachelor of Software Engineering](programme_name)?
    - Tell me the modules of [Diploma in Multimedia Design](programme_name)
    - What will I study in [Diploma in Early Childhood Special Education](programme_name)?
    - Show me the curriculum for [Bachelor of Real Estate Management](programme_name)
    - I want to see the outline of [Diploma in Aquaculture](programme_name)
    - What are the core modules in [Bachelor of Quantity Surveying](programme_name)?
    - Subjects offered in [Diploma in Manufacturing Technology](programme_name)
    - For [Bachelor of Information Technology (Honours) in Software Systems Development](programme_name), what courses are there?
    - Tell me about the [Diploma in Business Administration](programme_name) subjects

- intent: ask_course_info
  examples: |
    - Tell me about [Principles of Accounting](course_name)
    - What is [Financial Accounting](course_name)?
    - Can you explain [Object-Oriented Programming](course_name)?
    - I want to know more about [Building Construction Technology](course_name)
    - Describe [Introduction to Psychology](course_name)
    - What does [AI in Social Media Marketing](course_name) cover?
    - Is [Industrial Training](course_name) compulsory?

- intent: ask_faculty_programmes
  examples: |
    - What programmes are offered by the [fafb](faculty) faculty?
    - List all courses from [fobe](faculty)
    - Tell me about programmes in [fcci](faculty)
    - What does [focs](faculty) offer?
    - Show me diplomas from [foas](faculty)
    - Bachelor degrees in [foet](faculty)

- intent: ask_programme_duration
  examples: |
    - How long is the [Diploma in Business Administration](programme_name) programme?
    - What is the duration of [Bachelor of Software Engineering](programme_name)?
    - Can you tell me how many years [Diploma in Multimedia Design](programme_name) takes?
    - I want to know the length of [Diploma in Early Childhood Special Education](programme_name)
    - For [Bachelor of Real Estate Management](programme_name), how long is the course?
    - How many years does it take to complete [Diploma in Aquaculture](programme_name)?
    - What is the duration of [Bachelor of Quantity Surveying](programme_name)?
    - Can you tell me how long [Diploma in Manufacturing Technology](programme_name) takes?
    - I want to know the length of [Bachelor of Information Technology (Honours) in Software Systems Development](programme_name)
    - For [Diploma in Business Administration](programme_name), how long is the course?

- intent: ask_programme_career_opportunities
  examples: |
    - What career opportunities are there for [Diploma in Business Administration](programme_name) graduates?
    - Can you tell me about the job prospects for [Bachelor of Software Engineering](programme_name) graduates?
    - What kind of jobs can I get with a [Diploma in Multimedia Design](programme_name)?
    - I want to know the career paths for [Diploma in Early Childhood Special Education](programme_name) graduates
    - For [Bachelor of Real Estate Management](programme_name), what are the employment opportunities?
    - What careers can I pursue with a [Diploma in Aquaculture](programme_name)?
    - Can you tell me about the job market for [Bachelor of Quantity Surveying](programme_name) graduates?
    - What kind of roles can I get with a [Diploma in Manufacturing Technology](programme_name)?
    - I want to know the career prospects for [Bachelor of Information Technology (Honours) in Software Systems Development](programme_name) graduates
    - For [Diploma in Business Administration](programme_name), what are the employment opportunities?

- intent: ask_programme_entry_requirements
  examples: |
