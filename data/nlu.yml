- intent: ask_programme_intake
  examples: |
    - When is the intake for [Diploma in Business Administration](programme_name)?
    - Can you tell me the admission period for [Bachelor of Software Engineering](programme_name)?
    - What are the application deadlines for [Diploma in Multimedia Design](programme_name)?
    - I want to know the intake schedule for [Diploma in Early Childhood Special Education](programme_name)
    - For [Bachelor of Real Estate Management](programme_name), when can I apply?
    - What is the application timeline for [Diploma in Aquaculture](programme_name)?
    - Can you tell me the admission periods for [Bachelor of Quantity Surveying](programme_name)?
    - What are the deadlines for applying to [Diploma in Manufacturing Technology](programme_name)?
    - I want to know the intake schedule for [Bachelor of Information Technology (Honours) in Software Systems Development](programme_name)
