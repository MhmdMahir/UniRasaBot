    - For [Bachelor of Real Estate Management](programme_name), what are the requirements?
    - What qualifications do I need for [Diploma in Aquaculture](programme_name)?
    - Can you tell me about the admission requirements for [Bachelor of Quantity Surveying](programme_name)?
    - What do I need to apply for [Diploma in Manufacturing Technology](programme_name)?
    - I want to know the prerequisites for [Bachelor of Information Technology (Honours) in Software Systems Development](programme_name)
    - For [Diploma in Business Administration](programme_name), what are the entry requirements?

- intent: ask_programme_fees
  examples: |
    - How much does [Diploma in Business Administration](programme_name) cost?
    - Can you tell me the tuition fees for [Bachelor of Software Engineering](programme_name)?
    - What are the fees for [Diploma in Multimedia Design](programme_name)?
    - I want to know the cost of [Diploma in Early Childhood Special Education](programme_name)
