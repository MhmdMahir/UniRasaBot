version: "3.1"

nlu:

- intent: greet
  examples: |
    - Hi
    - Hello
    - Hey
    - Good morning
    - Good evening
    - Hi there
    - Hello there
    - Hey there
    - Hi bot
    - Hello bot
    - Hey bot


- intent: goodbye
  examples: |
    - Bye
    - Goodbye
    - See you later
    - See you soon
    - Take care
    - Have a nice day
    - Talk to you later
    - Catch you later
    - Farewell
    - I have to go now
    - I need to leave now
    - I need to go now 

- intent: affirm
  examples: |
    - Yes
    - Yeah
    - Yea
    - Yep
    - Sure
    - Of course
    - Definitely
    - Absolutely
    - I agree
    - That's right
    - Correct
    - That's true
    - I think so
    - I guess so
    - Sounds good
    - I believe so
    - I suppose so
    - I feel the same
    - I feel the same way
    - I feel the same about that

- intent: deny
  examples: |
    - No
    - Nope
    - Nah
    - Not really
    - I don't think so
    - I disagree
    - That's not right
    - That's false
    - I don't believe that
    - I don't think that's true
    - I don't feel the same way
    - I don't feel the same about that 
    - not at all
    - I don't think so at all
    - I don't feel that way at all


- intent: entry_eligibility
  examples: |
    - My son's SPM results average only, what [programme_level](programme_level) can he enter?
    - With CGPA [2.5](cgpa) can enter [degree](programme_level)?
    - Which courses are impossible with weak results?
    - If fail [Mathematics](subject), still can enter [engineering](course_name)?
    - Need bridging for [diploma](programme_level)?
    - How long is the bridging [duration](duration)?
    - After foundation is entry guaranteed?
    - If fail bridging what happens?
    - Requirements different for [international](nationality_status) students?
    - CGPA [3.0](cgpa) enough or not?

- intent: course_quality
  examples: |
    - Is [computer science](course_name) very hard?
    - What is the failure rate for core subjects?
    - Many students drop out from [engineering](course_name)?
    - Are lecturers full time or part time?
    - Do lecturers reply emails?
    - Are exams purposely difficult?
    - Is this course popular or leftover course?
    - How tough is [degree](programme_level)?

- intent: career_outcomes
  examples: |
    - After graduate from [accounting](course_name) what job can get?
    - Average starting salary after [degree](programme_level)?
    - With CGPA [2.5](cgpa) can survive job market?
    - Which companies hire [IT](course_name) graduates?
    - Internship guaranteed or find ourselves?
    - Hard to get job after this course?
    - 6 months after graduate still unemployed common?

- intent: financial_concerns
  examples: |
    - Total cost from foundation until [degree](programme_level)?
    - Any hidden [fee_type](fee_type)?
    - If repeat one subject how much?
    - Extend one semester extra how much cost?
    - Scholarships for CGPA [3.0](cgpa)?
    - Can pay by installment?
    - Any hidden fees like admin or exam fees?

- intent: student_support_pressure
  examples: |
    - Is study environment stressful?
    - Extra classes for weak students?
    - Any counselling support?
    - If student depressed who helps?
    - Many students repeat subjects?
    - Do lecturers care if student losing motivation?
    - Academic support available or not?

- intent: discipline_safety
  examples: |
    - Students skip class often?
    - Attendance strict or not?
    - Any bullying or drugs issue?
    - Campus safe at night?
    - Hostel noisy at night?
    - Discipline problems common?

- intent: course_flexibility
  examples: |
    - Can change from [diploma](programme_level) to [degree](programme_level)?
    - Switch from [business](course_name) to [IT](course_name)?
    - If change course need restart year 1?
    - If transfer to another university can credit transfer?
    - Fees transferable if change course?
    - If cannot cope can move to other university?

- intent: institution_reputation
  examples: |
    - Is this qualification recognized by government?
    - Employers respect this university?
    - Graduates face discrimination?
    - Which course highest dropout rate?
    - Which courses easier to pass but still useful?
    - Alumni doing well after 5 years?

- intent: parent_advice_request
  examples: |
    - Honestly would you recommend this course to your own child?
    - If you were me what should my son study?
    - Is this university just collecting fees?
    - Any course not worth the money?
    - For average student is this suitable?
    - Be honest with me is this a good choice?

  # follow this format for more intents and examples

- intent: ask_programme_outline
  examples: |
    - What are the subjects for the [Bachelor of Accounting](course_name)?
    - What modules are included in the [Diploma in Accounting](course_name)?
    - What subjects will I study in the [Degree in Data Science](course_name)?
    - Show me the programme outline for [Diploma in Information Technology](course_name)
    - What are the modules for [Bachelor of Software Engineering](course_name)?
- intent: ask_programme_duration
  examples: |
    - How long is the [Bachelor of Accounting](course_name)?
    - Duration of [Diploma in Accounting](course_name)?
    - How many years for [Degree in Data Science](course_name)?
    - Duration of [Diploma in Information Technology](course_name)?
    - How long is [Bachelor of Software Engineering](course_name)?

- intent: ask_programme_fee
  examples: |
    - What is the tuition fee for [Bachelor of Accounting](course_name)?
    - How much is the [Diploma in Accounting](course_name)?
    - Tuition fee for [Degree in Data Science](course_name)?
    - How much is [Diploma in Information Technology](course_name)?
    - What is the fee for [Bachelor of Software Engineering](course_name)? 